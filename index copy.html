<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gotas de Vida - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo-header">
                <strong>Gotas de vida</strong>
                <span>Doe sangue, salve vidas</span>
            </div>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Por que doar</a></li>
                <li><a href="#">Cuidados</a></li>
                <li><a href="#">Como doar</a></li>
                <li><a href="#">Hemocentros</a></li>
            </ul>
            <button class="btn-entrar">Entrar</button>
        </nav>
    </header>

    <main class="container">
        <div class="hero-section">
            <div class="logo-central">
                <img src="/imagens/logomarca.png" alt="Logo Gotas de Vida" class="main-logo">
                <h1 class="titulo-dourado">Gotas de Vida</h1>
            </div>
        </div>

        <div class="form-section">
            <div class="card-cadastro">
                <h2>Criar conta na Gotas de Vida</h2>
                <p>Preencha os campos abaixo para começar</p>
                
                <form id="formCadastro">
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                    <input type="email" id="email" placeholder="Seu @email.com" required>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>
                    
                    <button type="submit" class="btn-cadastrar">Cadastre-se</button>
                </form>
                <p id="mensagemErro" style="color: red; margin-top: 10px; font-size: 0.8rem; display: none;">As senhas não coincidem!</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
