<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="entrar.css">
    <link rel="shortcut icon" href="./imagens/favicon-logo.png" type="image/x-icon">
    <title>Entrar</title>
</head>

<body>

    <header>

        <div class="logo-area">
            <img src="./imagens/logomarca.png" alt="logo">

            <div>
                <h1>Gotas de Vida</h1>
                <h3>Doe Sangue, Salve vidas</h3>
            </div>
        </div>

        <nav>
            <a href="./index.html">Inicio</a>
            <a href="./Sobre.html">Sobre</a>
            <a href="./pqdoar.html">Por que doar</a>
            <a href="">Cuidados</a>
            <a href="./comodoar.html">Como doar</a>
            <a href="./hemocentros.html">Hemocentros</a>
            <a href="./entrar.html" id="btn-entrar"> Entrar </a>
        </nav>
    </header>

    <main>

        <section>

            <div>
                <h5 class="plata">Entrar</h5>
            </div>

            <div class="login-area">

                <div class="imagemdagota">
                    <img src="./imagens/logomarca.png" alt="">
                </div>

                <div class="content-login">
                    <form class="content-login-box">
                        <h3><strong>Entrar na Gotas de Vida</strong></h3>
                        <p>Entre com a sua conta para continuar</p>
                        <input type="text" id="email" class="inputs" placeholder="Insira seu email">
                        <input type="password" id="senha" class="inputs" placeholder="Insira sua senha">
                        <a href="#" class="forgot-password">Esqueceu a senha?</a>
                        <button type="button" class="btn-enter" onclick="login()">Entrar</button>
                        <hr>
                        <a href="./cadastro.html">Não tem uma conta? Cadastre-se</a>
                    </form>
                </div>

            </div>

        </section>

    </main>

    <script src="./entrar.js"></script>
</body>

</html>
